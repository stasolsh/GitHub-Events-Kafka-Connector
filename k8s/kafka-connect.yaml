apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  namespace: github-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-connect
  template:
    metadata:
      labels:
        app: kafka-connect
    spec:
      containers:
        - name: kafka-connect
          image: github-events-kafka-connector:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: CONNECT_REST_PORT
              value: "8083"
            - name: CONNECT_GROUP_ID
              value: github-events-connect-group
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: github-events-connect-configs
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: github-events-connect-offsets
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: github-events-connect-status
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: kafka-connect
            - name: CONNECT_PLUGIN_PATH
              value: /usr/share/java,/usr/share/confluent-hub-components
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-connect
  namespace: github-events
spec:
  selector:
    app: kafka-connect
  ports:
    - port: 8083
      targetPort: 8083