{{- if .Values.elasticsearch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: {{ include "github-events-platform.namespace" . }}
  labels:
    {{- include "github-events-platform.labels" . | nindent 4 }}
    app: elasticsearch
spec:
  replicas: {{ .Values.elasticsearch.replicas }}
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: {{ .Values.elasticsearch.image | quote }}
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.elasticsearch.javaOpts | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: {{ include "github-events-platform.namespace" . }}
  labels:
    {{- include "github-events-platform.labels" . | nindent 4 }}
    app: elasticsearch
spec:
  selector:
    app: elasticsearch
  ports:
    - port: {{ .Values.elasticsearch.service.port }}
      targetPort: 9200
  {{- end }}
