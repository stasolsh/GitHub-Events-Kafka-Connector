{{- if .Values.connectors.elasticsearchSink.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: register-elasticsearch-sink-connector
  namespace: {{ include "github-events-platform.namespace" . }}
  labels:
    {{- include "github-events-platform.labels" . | nindent 4 }}
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: {{ .Values.jobs.curlImage | quote }}
          command:
            - sh
            - -c
            - |
              sleep {{ .Values.jobs.elasticsearchSinkSleepSeconds }}
              curl -X POST http://kafka-connect:8083/connectors \
                -H "Content-Type: application/json" \
                -d '{
                  "name": "{{ .Values.connectors.elasticsearchSink.name }}",
                  "config": {
                    "connector.class": "io.confluent.connect.elasticsearch.ElasticsearchSinkConnector",
                    "tasks.max": "1",
                    "topics": "{{ .Values.connectors.elasticsearchSink.topics }}",
                    "connection.url": "http://elasticsearch:9200",
                    "key.ignore": "true",
                    "schema.ignore": "true",
                    "behavior.on.null.values": "ignore",
                    "max.retries": "{{ .Values.connectors.elasticsearchSink.maxRetries }}",
                    "retry.backoff.ms": "{{ .Values.connectors.elasticsearchSink.retryBackoffMs }}",
                    "errors.tolerance": "{{ .Values.connectors.elasticsearchSink.errors.tolerance }}",
                    "errors.retry.timeout": "{{ .Values.connectors.elasticsearchSink.errors.retryTimeout }}",
                    "errors.retry.delay.max.ms": "{{ .Values.connectors.elasticsearchSink.errors.retryDelayMaxMs }}",
                    "errors.log.enable": "{{ .Values.connectors.elasticsearchSink.errors.logEnable }}",
                    "errors.log.include.messages": "{{ .Values.connectors.elasticsearchSink.errors.logIncludeMessages }}",
                    "errors.deadletterqueue.topic.name": "{{ .Values.connectors.elasticsearchSink.errors.dlqTopic }}",
                    "errors.deadletterqueue.topic.replication.factor": "{{ .Values.connectors.elasticsearchSink.errors.dlqReplicationFactor }}"
                  }
                }'
  {{- end }}
